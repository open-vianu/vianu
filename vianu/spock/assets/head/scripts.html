<script>
  function clickHandler(card) {
    var details = document.getElementById("details");
    details.style.display = "block";
    details.innerHTML = card.getAttribute("data-details");

    var cards = document.getElementsByClassName("card");
    for (let ic of cards) {
      ic.style.borderWidth = "0px";
      ic.style.borderStyle = "none";
    }

    const element = getComputedStyle(document.documentElement)
    const color = element.getPropertyValue('--block-title-text-color');
    const width = element.getPropertyValue('--spacing-md');

    card.style.borderColor = color;
    card.style.borderWidth = width;
    card.style.borderStyle = "solid";
  }
</script>
