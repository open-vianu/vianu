name: Coverage Badge Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # Ensure tokens aren't passed to actions

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run Tests with Coverage
        run: |
          pytest --cov=your_package --cov-report=xml
        continue-on-error: false  # Fail the workflow if tests fail

      - name: Extract Coverage Percentage
        id: coverage
        run: |
          coverage_percentage=$(grep -oPm1 "(?<=<coverage .*line-rate=\")[^\"]+" coverage.xml)
          echo "::set-output name=percentage::$coverage_percentage"

      - name: Generate Coverage Badge
        id: badge
        run: |
          coverage=${{ steps.coverage.outputs.percentage }}
          coverage_percent=$(echo "$coverage * 100" | bc -l | awk '{printf("%.1f", $0)}')
          echo "Coverage: $coverage_percent%"
          # Create SVG badge
          cat <<EOF > coverage-badge.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="150" height="20">
            <linearGradient id="b" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <mask id="a">
              <rect width="150" height="20" rx="3" fill="#fff"/>
            </mask>
            <g mask="url(#a)">
              <path fill="#555" d="M0 0h60v20H0z"/>
              <path fill="#4c1" d="M60 0h90v20H60z"/>
              <path fill="url(#b)" d="M0 0h150v20H0z"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="30" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="30" y="14">coverage</text>
              <text x="105" y="15" fill="#010101" fill-opacity=".3">$coverage_percent%</text>
              <text x="105" y="14">$coverage_percent%</text>
            </g>
          </svg>
          EOF

      - name: Commit and Push Badge
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update coverage badge [skip ci]"
          file_pattern: coverage-badge.svg
          branch: main